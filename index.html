<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>After Effects Scripts Portfolio</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/overlay-system.css" />
    <script src="https://unpkg.com/lucide@0.564.0/dist/umd/lucide.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <button
          style="
            position: absolute;
            top: 1rem;
            right: 2rem;
            opacity: 0.7;
            font-size: 0.8rem;
            color: var(--header-subtitle);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            line-height: inherit;
          "
          id="theme-indicator"
          aria-label="Current theme: Dark Mode. Click to change."
        >
          <i data-lucide="moon" style="width: 14px; height: 14px"></i>
          Dark Mode
        </button>
        <h1 class="site-title">After Effects Scripts Portfolio</h1>
        <p class="site-subtitle">
          Interactive showcase of custom After Effects scripts
        </p>
      </div>
    </header>

    <nav class="navigation">
      <div class="container">
        <div class="search-bar">
          <label for="search-input" class="visually-hidden">Search scripts</label>
          <input
            type="text"
            id="search-input"
            placeholder="Search scripts..."
            aria-label="Search scripts"
          />
        </div>
        <div class="filters">
          <label for="category-filter" class="visually-hidden">Filter by category</label>
          <select id="category-filter" aria-label="Filter by category">
            <option value="">All Categories</option>
            <option value="utility">Utility</option>
            <option value="automation">Automation</option>
            <option value="workflow">Workflow</option>
          </select>
          <label for="sort-filter" class="visually-hidden">Sort scripts</label>
          <select id="sort-filter" aria-label="Sort scripts">
            <option value="name">Sort by Name</option>
            <option value="newest">Newest First</option>
            <option value="category">By Category</option>
          </select>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        <div id="scripts-grid" class="scripts-grid">
          <!-- Script cards will be dynamically populated here -->
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2025 After Effects Scripts Portfolio</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.1/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@17.0.2/lib/marked.umd.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/overlay-defaults.js"></script>
    <script src="js/overlay-engine.js"></script>
    <script>
      // Initialize the main page
      document.addEventListener('DOMContentLoaded', function () {
        (async function () {
          // Initialize Lucide icons
          if (typeof lucide !== 'undefined') {
            lucide.createIcons();
          }

          setupThemeDetection();

          // Check for tag filter before initial render to avoid double-render flash
          const urlParams = new URLSearchParams(window.location.search);
          const tagFilter = urlParams.get('tag');

          if (tagFilter) {
            // Skip the unfiltered render — handleFiltering fetches data and renders filtered in one pass
            setupFilters();
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
              searchInput.value = '';
            }
            showTagFilterMessage(tagFilter);
            await handleFiltering();
          } else {
            await loadScriptsList();
            setupFilters();
          }
        })().catch(err => {
          console.error('Page initialization failed:', err);
        });
      });

      // Re-sync UI when the user navigates back/forward through tag-filtered URLs
      window.addEventListener('popstate', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const tag = urlParams.get('tag');

        // Clear stale filter messages before re-rendering
        const tagMsg = document.getElementById('tag-filter-message');
        if (tagMsg) tagMsg.remove();
        const categoryMsg = document.getElementById('category-filter-message');
        if (categoryMsg) categoryMsg.remove();

        if (tag) {
          showTagFilterMessage(tag);
        }
        handleFiltering().catch(console.error);
      });

      /**
       * Shared helper: insert a filter banner after the navigation bar.
       * @param {string} id           - element id (for deduplication and removal)
       * @param {string} iconName     - lucide icon name
       * @param {string} labelHTML    - inner HTML for the label span
       * @param {string} clearFnName  - name of the JS function to call on "Clear"
       * @param {string} [extraClass] - optional extra CSS class on the element
       */
      function showFilterMessage(id, iconName, labelHTML, clearFnName, extraClass) {
        document.getElementById(id)?.remove();

        const message = document.createElement('div');
        message.id = id;
        if (extraClass) message.className = extraClass;
        message.style.cssText = `
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                padding: 0.75rem 1rem;
                margin: 1rem auto;
                text-align: center;
                max-width: 500px;
                color: var(--text-secondary);
                font-size: 0.875rem;
                font-weight: 400;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            `;
        message.innerHTML = `
                <i data-lucide="${iconName}" style="width: 16px; height: 16px; color: var(--text-secondary);"></i>
                ${labelHTML}
                <button onclick="${clearFnName}()" style="margin-left: 0.5rem; padding: 0.25rem 0.75rem; background: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: background 0.2s ease;" onmouseover="this.style.setProperty('background','var(--accent-hover)')" onmouseout="this.style.setProperty('background','var(--accent-color)')">Clear</button>
            `;

        const nav = document.querySelector('.navigation');
        nav.parentNode.insertBefore(message, nav.nextSibling);
        if (typeof lucide !== 'undefined') {
          requestAnimationFrame(() => lucide.createIcons());
        }
      }

      /**
       * Show message when filtering by tag
       */
      function showTagFilterMessage(tag) {
        showFilterMessage(
          'tag-filter-message',
          'tag',
          `<span>Showing scripts tagged with <strong style="color: var(--text-primary);">"${sanitizeHTML(tag)}"</strong></span>`,
          'clearTagFilter'
        );
      }

      function showCategoryFilterMessage(categoryId, categoryName) {
        showFilterMessage(
          'category-filter-message',
          'layers',
          `<span>Showing scripts with the category of <strong style="color: var(--text-primary);">"${sanitizeHTML(categoryName)}"</strong></span>`,
          'clearCategoryFilter',
          'category-filter-message'
        );
      }

      /**
       * Clear tag filter without a full page reload
       */
      function clearTagFilter() {
        const url = new URL(window.location);
        url.searchParams.delete('tag');
        window.history.pushState({}, '', url);
        document.getElementById('tag-filter-message')?.remove();
        handleFiltering().catch(console.error);
      }

      /**
       * Clear category filter
       */
      function clearCategoryFilter() {
        // Reset category dropdown
        const categoryFilter = document.getElementById('category-filter');
        if (categoryFilter) {
          categoryFilter.value = '';
        }

        // Remove category filter message
        const categoryMessage = document.getElementById(
          'category-filter-message'
        );
        if (categoryMessage) {
          categoryMessage.remove();
        }

        // Trigger filtering to update results
        handleFiltering().catch(console.error);
      }
    </script>
  </body>
</html>
